  <polygon points="30,16 36,22 33,30 27,30 24,22" fill="#0E1E40"/>
  <line x1="30" y1="8" x2="30" y2="16" stroke="#0E1E40" stroke-width="2"/>
  <line x1="42" y1="30" x2="50" y2="30" stroke="#0E1E40" stroke-width="2"/>
  <line x1="36" y1="22" x2="44" y2="18" stroke="#0E1E40" stroke-width="2"/>
  <line x1="24" y1="22" x2="16" y2="18" stroke="#0E1E40" stroke-width="2"/>
  <line x1="33" y1="30" x2="38" y2="42" stroke="#0E1E40" stroke-width="2"/>
  <line x1="27" y1="30" x2="22" y2="42" stroke="#0E1E40" stroke-width="2"/>
